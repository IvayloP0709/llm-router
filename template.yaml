AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: LLM Router API

Globals:
  Function:
    Timeout: 60
    MemorySize: 512

Resources:
  RouterFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: aws.lambda_handler.handler
      Runtime: python3.11
      CodeUri: .
      Architectures:
        - x86_64
      Events:
        ProxyApi:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
        HealthApi:
          Type: Api
          Properties:
            Path: /health
            Method: GET

Outputs:
  ApiUrl:
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"